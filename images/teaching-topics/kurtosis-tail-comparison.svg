  <text class="math" x="460" y="354" text-anchor="middle">0</text>
  <text class="math" x="591.6" y="354" text-anchor="middle">√3</text>
  <text class="math" x="886" y="336">x</text>
  <text class="math" x="54" y="54" text-anchor="end">f(x)</text>

  <g transform="translate(620,62)">
    <line class="laplace" x1="0" y1="0" x2="48" y2="0"/>
    <text class="small" x="60" y="6">拉普拉斯　α<tspan class="sub">4</tspan> = 6</text>
    <line class="normal" x1="0" y1="34" x2="48" y2="34"/>
    <text class="small" x="60" y="40">常態　α<tspan class="sub">4</tspan> = 3</text>
    <line class="uniform" x1="0" y1="68" x2="48" y2="68"/>
    <text class="small" x="60" y="74">均勻　α<tspan class="sub">4</tspan> = 9/5</text>
  </g>

  <text class="label" x="470" y="388" text-anchor="middle">三者的期望值皆為 0，變異數皆為 1</text>
</svg>
