<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" role="img" aria-labelledby="title desc">
  <title id="title">Kurtosis coefficients for three equal-location and equal-variance distributions</title>
  <desc id="desc">A Laplace distribution with kurtosis six, a standard normal distribution with kurtosis three, and a uniform distribution with kurtosis nine fifths. All three have mean zero and variance one.</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#1f1c18"/>
    </marker>
    <style>
      .frame { fill: none; stroke: #c9c1b4; stroke-width: 2; }
      .axis { stroke: #1f1c18; stroke-width: 1.8; marker-end: url(#axis-arrow); }
      .tick { stroke: #1f1c18; stroke-width: 1.4; }
      .guide { stroke: #7e7468; stroke-width: 1.4; stroke-dasharray: 7 6; }
      .normal { fill: none; stroke: #1f1c18; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .laplace { fill: none; stroke: #9c2d2d; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .uniform { fill: none; stroke: #5f7561; stroke-width: 3; stroke-dasharray: 9 7; stroke-linejoin: round; }
      .label { font-family: "Noto Serif TC", "Songti TC", Georgia, serif; fill: #1f1c18; font-size: 18px; }
      .small { font-family: "Noto Serif TC", "Songti TC", Georgia, serif; fill: #5b5148; font-size: 16px; }
      .math { font-family: Georgia, "Times New Roman", serif; font-style: italic; fill: #1f1c18; font-size: 19px; }
      .sub { font-size: 13px; baseline-shift: sub; }
    </style>
  </defs>

