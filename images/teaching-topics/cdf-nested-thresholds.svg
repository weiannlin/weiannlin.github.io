<svg xmlns="http://www.w3.org/2000/svg" width="720" height="270" viewBox="0 0 720 270" role="img" aria-labelledby="title desc">
  <title id="title">Nested threshold events for a cumulative distribution function</title>
  <desc id="desc">Two parallel number lines show that the event X less than or equal to x1 is contained in the event X less than or equal to x2 when x1 is less than or equal to x2.</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 Z" fill="#1f1c18"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="684" height="234" rx="18" fill="none" stroke="#c9c1b4" stroke-width="2"/>

  <text x="66" y="62" fill="#8a7f72" font-family="'Noto Serif TC', 'Songti TC', Georgia, serif" font-size="18">同一條數線，門檻 <tspan font-family="Georgia, 'Times New Roman', serif" font-style="italic">x<tspan baseline-shift="sub" font-size="70%">1</tspan></tspan></text>
  <text x="66" y="152" fill="#8a7f72" font-family="'Noto Serif TC', 'Songti TC', Georgia, serif" font-size="18">同一條數線，門檻 <tspan font-family="Georgia, 'Times New Roman', serif" font-style="italic">x<tspan baseline-shift="sub" font-size="70%">2</tspan></tspan></text>

  <line x1="130" y1="96" x2="635" y2="96" stroke="#1f1c18" stroke-width="2.6" marker-end="url(#axis-arrow)"/>
  <line x1="130" y1="186" x2="635" y2="186" stroke="#1f1c18" stroke-width="2.6" marker-end="url(#axis-arrow)"/>

  <line x1="132" y1="96" x2="335" y2="96" stroke="#9c2d2d" stroke-width="9" stroke-linecap="round" opacity="0.46"/>
  <line x1="132" y1="186" x2="455" y2="186" stroke="#9c2d2d" stroke-width="9" stroke-linecap="round" opacity="0.46"/>

  <line x1="335" y1="66" x2="335" y2="122" stroke="#9c2d2d" stroke-width="2.5"/>
  <line x1="455" y1="156" x2="455" y2="212" stroke="#9c2d2d" stroke-width="2.5"/>
  <text x="326" y="55" fill="#9c2d2d" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-style="italic">x<tspan baseline-shift="sub" font-size="70%">1</tspan></text>
  <text x="446" y="145" fill="#9c2d2d" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-style="italic">x<tspan baseline-shift="sub" font-size="70%">2</tspan></text>

  <text x="46" y="104" fill="#9c2d2d" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-style="italic">(-∞, x<tspan baseline-shift="sub" font-size="70%">1</tspan>]</text>
  <text x="46" y="194" fill="#9c2d2d" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-style="italic">(-∞, x<tspan baseline-shift="sub" font-size="70%">2</tspan>]</text>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="19" font-style="italic">
    <circle cx="160" cy="96" r="6.5" fill="#9c2d2d"/>
    <circle cx="260" cy="96" r="6.5" fill="#9c2d2d"/>
    <circle cx="420" cy="96" r="6.5" fill="#8a7f72"/>
    <circle cx="555" cy="96" r="6.5" fill="#8a7f72"/>
    <text x="143" y="128" fill="#1f1c18">ω<tspan baseline-shift="sub" font-size="70%">1</tspan></text>
    <text x="243" y="128" fill="#1f1c18">ω<tspan baseline-shift="sub" font-size="70%">2</tspan></text>
    <text x="403" y="128" fill="#8a7f72">ω<tspan baseline-shift="sub" font-size="70%">3</tspan></text>
    <text x="538" y="128" fill="#8a7f72">ω<tspan baseline-shift="sub" font-size="70%">4</tspan></text>

    <circle cx="160" cy="186" r="6.5" fill="#9c2d2d"/>
    <circle cx="260" cy="186" r="6.5" fill="#9c2d2d"/>
    <circle cx="420" cy="186" r="6.5" fill="#9c2d2d"/>
    <circle cx="555" cy="186" r="6.5" fill="#8a7f72"/>
    <text x="143" y="220" fill="#1f1c18">ω<tspan baseline-shift="sub" font-size="70%">1</tspan></text>
    <text x="243" y="220" fill="#1f1c18">ω<tspan baseline-shift="sub" font-size="70%">2</tspan></text>
    <text x="403" y="220" fill="#1f1c18">ω<tspan baseline-shift="sub" font-size="70%">3</tspan></text>
    <text x="538" y="220" fill="#8a7f72">ω<tspan baseline-shift="sub" font-size="70%">4</tspan></text>
  </g>
</svg>
