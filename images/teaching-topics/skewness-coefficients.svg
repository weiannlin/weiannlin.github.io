<svg xmlns="http://www.w3.org/2000/svg" width="940" height="1100" viewBox="0 0 940 1100" role="img" aria-labelledby="title desc">
  <title id="title">Skewness coefficients</title>
  <desc id="desc">Textbook-style sketches for right-skewed, left-skewed, and symmetric distributions with alpha three and central tendency locations.</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#1f1c18"/>
    </marker>
    <style>
      .frame { fill: none; stroke: #c9c1b4; stroke-width: 2; }
      .axis { stroke: #1f1c18; stroke-width: 1.7; marker-end: url(#axis-arrow); }
      .curve { fill: none; stroke: #1f1c18; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .guide { stroke: #7e7468; stroke-width: 1.8; stroke-dasharray: 7 6; }
      .accent { fill: #9c2d2d; }
      .label { font-family: "Noto Serif TC", "Songti TC", Georgia, serif; fill: #1f1c18; font-size: 20px; }
      .small { font-family: "Noto Serif TC", "Songti TC", Georgia, serif; fill: #5b5148; font-size: 17px; }
      .math { font-family: Georgia, "Times New Roman", serif; font-style: italic; fill: #1f1c18; font-size: 20px; }
      .math-accent { font-family: Georgia, "Times New Roman", serif; font-style: italic; fill: #9c2d2d; font-size: 21px; }
      .sub { font-size: 13px; baseline-shift: sub; }
    </style>
  </defs>

  <rect class="frame" x="24" y="24" width="892" height="1052" rx="12"/>

  <g transform="translate(62,55)">
    <path class="curve" d="M 64 214 C 96 212, 126 179, 156 127 C 190 69, 228 36, 276 40 C 335 45, 383 84, 436 122 C 510 175, 590 203, 735 214"/>
    <line class="axis" x1="0" y1="214" x2="790" y2="214"/>
    <line class="guide" x1="276" y1="40" x2="276" y2="214"/>
    <line class="guide" x1="390" y1="91" x2="390" y2="214"/>
    <line class="guide" x1="452" y1="132" x2="452" y2="214"/>
    <text class="math" x="276" y="244" text-anchor="middle">m<tspan class="sub">o</tspan></text>
    <text class="math" x="390" y="244" text-anchor="middle">η<tspan class="sub">X</tspan></text>
    <text class="math" x="452" y="244" text-anchor="middle">μ<tspan class="sub">X</tspan></text>
    <text class="math" x="814" y="220" text-anchor="start">x</text>
    <text class="math-accent" x="606" y="62" text-anchor="middle">α<tspan class="sub">3</tspan> &gt; 0</text>
    <text class="label" x="395" y="281" text-anchor="middle">右偏分配（正偏分配）</text>
    <text class="small" x="395" y="309" text-anchor="middle">尾巴向右延伸，常見位置關係為 m<tspan class="sub">o</tspan> ≤ η<tspan class="sub">X</tspan> ≤ μ<tspan class="sub">X</tspan></text>
  </g>

  <g transform="translate(62,385)">
    <path class="curve" d="M 55 214 C 200 203, 280 175, 354 122 C 407 84, 455 45, 514 40 C 562 36, 600 69, 634 127 C 664 179, 694 212, 726 214"/>
    <line class="axis" x1="0" y1="214" x2="790" y2="214"/>
    <line class="guide" x1="338" y1="132" x2="338" y2="214"/>
    <line class="guide" x1="400" y1="91" x2="400" y2="214"/>
    <line class="guide" x1="514" y1="40" x2="514" y2="214"/>
    <text class="math" x="338" y="244" text-anchor="middle">μ<tspan class="sub">X</tspan></text>
    <text class="math" x="400" y="244" text-anchor="middle">η<tspan class="sub">X</tspan></text>
    <text class="math" x="514" y="244" text-anchor="middle">m<tspan class="sub">o</tspan></text>
    <text class="math" x="814" y="220" text-anchor="start">x</text>
    <text class="math-accent" x="184" y="62" text-anchor="middle">α<tspan class="sub">3</tspan> &lt; 0</text>
    <text class="label" x="395" y="281" text-anchor="middle">左偏分配（負偏分配）</text>
    <text class="small" x="395" y="309" text-anchor="middle">尾巴向左延伸，常見位置關係為 μ<tspan class="sub">X</tspan> ≤ η<tspan class="sub">X</tspan> ≤ m<tspan class="sub">o</tspan></text>
  </g>

  <g transform="translate(62,715)">
    <path class="curve" d="M 70 214 C 110 213, 160 202, 212 168 C 284 122, 326 36, 395 36 C 464 36, 506 122, 578 168 C 630 202, 680 213, 720 214"/>
    <line class="axis" x1="0" y1="214" x2="790" y2="214"/>
    <line class="guide" x1="395" y1="36" x2="395" y2="214"/>
    <text class="math" x="395" y="244" text-anchor="middle">m<tspan class="sub">o</tspan> = η<tspan class="sub">X</tspan> = μ<tspan class="sub">X</tspan></text>
    <text class="math" x="814" y="220" text-anchor="start">x</text>
    <text class="math-accent" x="620" y="62" text-anchor="middle">α<tspan class="sub">3</tspan> = 0</text>
    <text class="label" x="395" y="281" text-anchor="middle">對稱分配</text>
  </g>
</svg>
