<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Point probability for a continuous random variable</title>
  <desc id="desc">A smooth density curve with a single vertical line at a, showing that a single point has no width and hence no area under the density curve.</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#1f1c18"/>
    </marker>
    <marker id="thin-arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#9c2d2d"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="684" height="324" rx="18" fill="none" stroke="#c9c1b4" stroke-width="2"/>

  <line x1="82" y1="282" x2="642" y2="282" stroke="#1f1c18" stroke-width="2" marker-end="url(#axis-arrow)"/>
  <line x1="82" y1="282" x2="82" y2="62" stroke="#1f1c18" stroke-width="2" marker-end="url(#axis-arrow)"/>

  <path d="M 100 280.7 L 110 280.1 L 120 279.2 L 130 278 L 140 276.5 L 150 274.4 L 160 271.7 L 170 268.2 L 180 263.8 L 190 258.4 L 200 251.9 L 210 244.1 L 220 235 L 230 224.5 L 240 212.8 L 250 199.9 L 260 186 L 270 171.4 L 280 156.5 L 290 141.7 L 300 127.4 L 310 114.3 L 320 102.7 L 330 93.1 L 340 85.9 L 350 81.5 L 360 80 L 370 81.5 L 380 85.9 L 390 93.1 L 400 102.7 L 410 114.3 L 420 127.4 L 430 141.7 L 440 156.5 L 450 171.4 L 460 186 L 470 199.9 L 480 212.8 L 490 224.5 L 500 235 L 510 244.1 L 520 251.9 L 530 258.4 L 540 263.8 L 550 268.2 L 560 271.7 L 570 274.4 L 580 276.5 L 590 278 L 600 279.2 L 610 280.1 L 620 280.7" fill="none" stroke="#1f1c18" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <line x1="410" y1="282" x2="410" y2="114.3" stroke="#9c2d2d" stroke-width="2.2" stroke-dasharray="7 6"/>
  <circle cx="410" cy="114.3" r="4.8" fill="#9c2d2d"/>
  <path d="M 508 160 C 478 168, 444 184, 410 198" fill="none" stroke="#9c2d2d" stroke-width="2" stroke-linecap="round" marker-end="url(#thin-arrow)"/>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="648" y="290" fill="#1f1c18" font-size="21" font-style="italic">t</text>
    <text x="40" y="68" fill="#1f1c18" font-size="20" font-style="italic">f<tspan baseline-shift="sub" font-size="70%">X</tspan>(t)</text>
    <text x="404" y="306" fill="#9c2d2d" font-size="21" font-style="italic">a</text>
    <text x="508" y="154" fill="#9c2d2d" font-size="18" font-style="normal" font-family="'Noto Serif TC', 'Songti TC', Georgia, serif">單點面積為 0</text>
  </g>

</svg>
