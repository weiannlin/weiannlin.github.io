<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" role="img" aria-labelledby="title desc">
  <title id="title">Quantile from a CDF</title>
  <desc id="desc">A cumulative distribution function. A horizontal line at probability p meets the CDF, and the corresponding x value is x_p.</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#1f1c18"/>
    </marker>
    <marker id="red-arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#9c2d2d"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="684" height="344" rx="18" fill="none" stroke="#c9c1b4" stroke-width="2"/>

  <line x1="92" y1="292" x2="632" y2="292" stroke="#1f1c18" stroke-width="2" marker-end="url(#axis-arrow)"/>
  <line x1="92" y1="292" x2="92" y2="58" stroke="#1f1c18" stroke-width="2" marker-end="url(#axis-arrow)"/>

  <g stroke="#c9c1b4" stroke-width="1.1" stroke-dasharray="4 7">
    <line x1="92" y1="248" x2="622" y2="248"/>
    <line x1="92" y1="202" x2="622" y2="202"/>
    <line x1="92" y1="156" x2="622" y2="156"/>
    <line x1="92" y1="110" x2="622" y2="110"/>
  </g>

  <path d="M 112 282
           C 152 281, 184 270, 214 242
           C 252 207, 287 186, 328 170
           C 371 153, 407 129, 445 103
           C 494 70, 552 64, 612 64"
        fill="none" stroke="#1f1c18" stroke-width="3.2" stroke-linecap="round"/>

  <path d="M 92 129 L 406 129" fill="none" stroke="#9c2d2d" stroke-width="2.4" stroke-dasharray="8 6" marker-end="url(#red-arrow)"/>
  <path d="M 406 129 L 406 292" fill="none" stroke="#9c2d2d" stroke-width="2.4" stroke-dasharray="8 6" marker-end="url(#red-arrow)"/>
  <circle cx="406" cy="129" r="6.2" fill="#9c2d2d" stroke="#9c2d2d" stroke-width="2"/>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#1f1c18">
    <text x="644" y="300" font-size="21" font-style="italic">x</text>
    <text x="42" y="62" font-size="20" font-style="italic">F<tspan baseline-shift="sub" font-size="70%">X</tspan>(x)</text>
    <text x="82" y="135" text-anchor="end" font-size="21" font-style="italic" fill="#9c2d2d">p</text>
    <text x="406" y="326" text-anchor="middle" font-size="21" font-style="italic" fill="#9c2d2d">x<tspan baseline-shift="sub" font-size="70%">p</tspan></text>
  </g>

  <g font-family="'Noto Serif TC', 'Songti TC', Georgia, serif" fill="#9c2d2d" font-size="19">
    <text x="188" y="116" text-anchor="middle">先固定累積機率</text>
    <text x="498" y="196" text-anchor="middle">再回到數線位置</text>
  </g>
</svg>
