<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">CDF jumps for a fair die</title>
  <desc id="desc">A step plot of the CDF for a fair die. Dotted vertical lines and open and filled circles mark the jumps. The value at x equal to 3.4 is shown at height three sixths, and one jump height is marked as one sixth.</desc>
  <defs>
    <marker id="axis-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#1f1c18"/>
    </marker>
    <marker id="bend-arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 1 1 L 8 4.5 L 1 8 Z" fill="#9c2d2d"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="684" height="324" rx="18" fill="none" stroke="#c9c1b4" stroke-width="2"/>

  <line x1="92" y1="282" x2="632" y2="282" stroke="#1f1c18" stroke-width="2" marker-end="url(#axis-arrow)"/>
  <line x1="92" y1="282" x2="92" y2="62" stroke="#1f1c18" stroke-width="2" marker-end="url(#axis-arrow)"/>

  <text x="644" y="290" fill="#1f1c18" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-style="italic">x</text>
  <text x="44" y="66" fill="#1f1c18" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic">F<tspan baseline-shift="sub" font-size="70%">X</tspan>(x)</text>

  <g stroke="#c9c1b4" stroke-width="1.1" stroke-dasharray="4 7">
    <line x1="92" y1="246" x2="610" y2="246"/>
    <line x1="92" y1="210" x2="610" y2="210"/>
    <line x1="92" y1="174" x2="610" y2="174"/>
    <line x1="92" y1="138" x2="610" y2="138"/>
    <line x1="92" y1="102" x2="610" y2="102"/>
    <line x1="92" y1="66" x2="610" y2="66"/>
  </g>

  <g fill="#8a7f72" font-family="Georgia, 'Times New Roman', serif" font-size="17">
    <text x="52" y="252">1/6</text>
    <text x="52" y="216">2/6</text>
    <text x="52" y="180">3/6</text>
    <text x="52" y="144">4/6</text>
    <text x="52" y="108">5/6</text>
    <text x="64" y="72">1</text>
  </g>

  <g stroke="#1f1c18" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="96" y1="282" x2="150" y2="282"/>
    <line x1="150" y1="246" x2="240" y2="246"/>
    <line x1="240" y1="210" x2="330" y2="210"/>
    <line x1="330" y1="174" x2="420" y2="174"/>
    <line x1="420" y1="138" x2="510" y2="138"/>
    <line x1="510" y1="102" x2="600" y2="102"/>
    <line x1="600" y1="66" x2="626" y2="66"/>
  </g>

  <g stroke="#9c2d2d" stroke-width="2.1" fill="none" stroke-linecap="round" stroke-dasharray="1 7">
    <line x1="150" y1="282" x2="150" y2="246"/>
    <line x1="240" y1="246" x2="240" y2="210"/>
    <line x1="330" y1="210" x2="330" y2="174"/>
    <line x1="420" y1="174" x2="420" y2="138"/>
    <line x1="510" y1="138" x2="510" y2="102"/>
    <line x1="600" y1="102" x2="600" y2="66"/>
  </g>

  <g stroke="#1f1c18" stroke-width="2.2">
    <circle cx="150" cy="282" r="5.4" fill="#f5efe5"/>
    <circle cx="150" cy="246" r="5.4" fill="#1f1c18"/>
    <circle cx="240" cy="246" r="5.4" fill="#f5efe5"/>
    <circle cx="240" cy="210" r="5.4" fill="#1f1c18"/>
    <circle cx="330" cy="210" r="5.4" fill="#f5efe5"/>
    <circle cx="330" cy="174" r="5.4" fill="#1f1c18"/>
    <circle cx="420" cy="174" r="5.4" fill="#f5efe5"/>
    <circle cx="420" cy="138" r="5.4" fill="#1f1c18"/>
    <circle cx="510" cy="138" r="5.4" fill="#f5efe5"/>
    <circle cx="510" cy="102" r="5.4" fill="#1f1c18"/>
    <circle cx="600" cy="102" r="5.4" fill="#f5efe5"/>
    <circle cx="600" cy="66" r="5.4" fill="#1f1c18"/>
  </g>

  <g stroke="#9c2d2d" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="366" y1="282" x2="366" y2="174" stroke-dasharray="7 6"/>
    <line x1="92" y1="174" x2="366" y2="174" stroke-dasharray="7 6"/>
  </g>
  <path d="M 576 134 C 560 126, 540 124, 520 122" fill="none" stroke="#9c2d2d" stroke-width="2" stroke-linecap="round" marker-end="url(#bend-arrow)"/>
  <circle cx="366" cy="174" r="5.8" fill="#9c2d2d"/>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="18">
    <g fill="#1f1c18">
      <text x="145" y="307">1</text>
      <text x="235" y="307">2</text>
      <text x="325" y="307">3</text>
      <text x="415" y="307">4</text>
      <text x="505" y="307">5</text>
      <text x="595" y="307">6</text>
    </g>
    <g fill="#9c2d2d">
      <text x="374" y="272" font-size="21" font-style="italic">x=3.4</text>
      <text x="116" y="155" font-size="20" font-style="italic">F<tspan baseline-shift="sub" font-size="70%">X</tspan>(3.4)=3/6</text>
    </g>
    <g fill="#9c2d2d" font-family="'Noto Serif TC', 'Songti TC', Georgia, serif" font-size="17">
      <text x="580" y="144">跳躍高度 1/6</text>
    </g>
  </g>
</svg>
